version: "3.9"

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file: .env.prod
    restart: unless-stopped
    volumes:
      - minio_data:/data
    networks:
      - studio_internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env.prod
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/video-editor-assets;
      mc mb --ignore-existing local/video-editor-exports;
      mc mb --ignore-existing local/video-editor-thumbnails;
      mc anonymous set download local/video-editor-thumbnails;
      exit 0;
      "
    networks:
      - studio_internal

  api:
    image: video-editor-api:latest
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      REDIS_URL: redis://opencut-redis:6379/2
      MINIO_ENDPOINT: minio:9000
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - studio_internal
      - opencut_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  worker-video:
    image: video-editor-api:latest
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      REDIS_URL: redis://opencut-redis:6379/2
      MINIO_ENDPOINT: minio:9000
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - studio_internal
      - opencut_net
    command: celery -A app.workers.celery_app worker -Q video -c 2 -l info

  worker-ai:
    image: video-editor-api:latest
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      REDIS_URL: redis://opencut-redis:6379/2
      MINIO_ENDPOINT: minio:9000
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - studio_internal
      - opencut_net
    command: celery -A app.workers.celery_app worker -Q ai -c 2 -l info

  worker-asset:
    image: video-editor-api:latest
    env_file: .env.prod
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-veditor}:${POSTGRES_PASSWORD}@opencut-postgres:5432/video_editor
      REDIS_URL: redis://opencut-redis:6379/2
      MINIO_ENDPOINT: minio:9000
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - studio_internal
      - opencut_net
    command: celery -A app.workers.celery_app worker -Q asset -c 1 -l info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    networks:
      - studio_internal

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/conf.d/default.conf
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    networks:
      - studio_internal

networks:
  studio_internal:
    driver: bridge
  opencut_net:
    external: true
    name: shared_services

volumes:
  minio_data:
